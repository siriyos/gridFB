<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FB 5-Grid">
<title>FB 5-Photo Grid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#0a0a0a;color:#f0f0f0;font-family:-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
.wrap{width:100%;max-width:440px}
.header{text-align:center;margin-bottom:20px}
.header-label{font-size:11px;letter-spacing:4px;color:#555;text-transform:uppercase;margin-bottom:5px}
.header-title{font-size:28px;font-weight:700;letter-spacing:-.5px}
.header-sub{font-size:11px;color:#555;margin-top:3px;min-height:16px}
.diagram{background:#111;border-radius:10px;padding:10px;margin-bottom:16px}
.diagram-label{font-size:10px;color:#444;text-align:center;margin-bottom:8px}
.diagram-row{display:flex;gap:2px;margin-bottom:2px}
.diagram-cell{flex:1;border-radius:4px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-weight:700}
.dropzone{border:1.5px dashed #333;border-radius:14px;padding:52px 24px;text-align:center;cursor:pointer;background:#111}
#cropWrap{position:relative;margin:0 auto 14px;border-radius:8px;overflow:hidden;background:#111;touch-action:none;cursor:move}
#cropWrap img{display:block;width:100%;height:100%;object-fit:fill}
.dim{position:absolute;background:rgba(0,0,0,.6);pointer-events:none}
#cropBox{position:absolute;border:2px solid #f33;pointer-events:none}
.gl{position:absolute;background:rgba(255,51,51,.4);pointer-events:none}
.glb{position:absolute;background:rgba(255,51,51,.8);pointer-events:none}
.corner{position:absolute;width:14px;height:14px;pointer-events:none}
.slider-wrap{background:#111;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.slider-label{font-size:11px;color:#666;margin-bottom:8px}
input[type=range]{width:100%;accent-color:#f33}
.btn-row{display:flex;gap:10px;margin-bottom:14px}
button{flex:1;padding:13px 0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid #444;background:#1a1a1a;color:#f0f0f0;-webkit-appearance:none}
.btn-white{background:#fff;border-color:#fff;color:#000}
.btn-red{background:#f33;border-color:#f33;color:#fff}
.preview-wrap{background:#111;border-radius:12px;padding:8px;margin-bottom:14px}
.preview-label{font-size:10px;color:#444;text-align:center;margin-bottom:6px}
.preview-row{display:flex;gap:2px;margin-bottom:2px}
.preview-cell{flex:1;overflow:hidden;border-radius:4px;cursor:pointer}
.preview-cell img{width:100%;height:100%;object-fit:cover;display:block}
.tile-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.tile-item{display:flex;align-items:center;gap:10px;background:#111;border-radius:8px;padding:8px 12px;cursor:pointer}
.tile-thumb{width:46px;height:46px;object-fit:cover;border-radius:5px}
.tile-name{font-size:13px;font-weight:600}
.tile-size{font-size:9px;color:#555}
.tile-dl{font-size:16px;color:#555}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-label">Facebook</div>
    <div class="header-title">5-Photo Grid</div>
    <div class="header-sub" id="sub">ตัดภาพเดียวเป็น 5 ช่องพอดี FB layout</div>
  </div>

  <div class="diagram">
    <div class="diagram-label">layout ที่ FB จะแสดง (วัดจาก FB จริง)</div>
    <div class="diagram-row">
      <div class="diagram-cell" style="height:80px;font-size:18px;color:#4caf50">①</div>
      <div class="diagram-cell" style="height:80px;font-size:18px;color:#4a8fd4">②</div>
    </div>
    <div class="diagram-row">
      <div class="diagram-cell" style="height:60px;font-size:15px;color:#d47a4a">③</div>
      <div class="diagram-cell" style="height:60px;font-size:15px;color:#a04ad4">④</div>
      <div class="diagram-cell" style="height:60px;font-size:15px;color:#4acfcf">⑤</div>
    </div>
  </div>

  <div id="sUpload">
    <label class="dropzone">
      <div style="font-size:40px;margin-bottom:12px">🖼️</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:4px">แตะเพื่อเลือกรูป</div>
      <div style="font-size:11px;color:#555">รูปอะไรก็ได้ — ตัดเป็น 5 ช่องพอดี FB</div>
      <input type="file" accept="image/*" style="display:none" onchange="loadFile(this)">
    </label>
  </div>

  <div id="sCrop" style="display:none">
    <div id="cropWrap">
      <img id="cropImg" src="">
      <div class="dim" id="dT"></div><div class="dim" id="dB"></div>
      <div class="dim" id="dL"></div><div class="dim" id="dR"></div>
      <div id="cropBox">
        <div class="glb" id="hLine"></div>
        <div class="glb" id="v1"></div>
        <div class="glb" id="v2"></div>
        <div class="glb" id="v3"></div>
        <div class="corner" style="top:-1px;left:-1px;border-top:3px solid #f33;border-left:3px solid #f33"></div>
        <div class="corner" style="top:-1px;right:-1px;border-top:3px solid #f33;border-right:3px solid #f33"></div>
        <div class="corner" style="bottom:-1px;left:-1px;border-bottom:3px solid #f33;border-left:3px solid #f33"></div>
        <div class="corner" style="bottom:-1px;right:-1px;border-bottom:3px solid #f33;border-right:3px solid #f33"></div>
      </div>
    </div>
    <div class="slider-wrap">
      <div class="slider-label" id="sliderLbl">ขนาด: 100%</div>
      <input type="range" id="slider" min="20" max="100" value="100" oninput="onSlider(this.value)">
    </div>
    <div class="btn-row">
      <button onclick="goUpload()">← กลับ</button>
      <button class="btn-red" onclick="cut()">✂️ Confirm &amp; Cut</button>
    </div>
  </div>

  <div id="sResult" style="display:none">
    <div class="preview-wrap">
      <div class="preview-label">ตัวอย่างแสดงผลบน FB</div>
      <div class="preview-row" id="prevTop"></div>
      <div class="preview-row" id="prevBot"></div>
    </div>
    <div class="tile-list" id="tileList"></div>
    <div class="btn-row">
      <button onclick="goUpload()">รูปใหม่</button>
      <button class="btn-white" onclick="dlAll()">⬇️ โหลดทั้ง 5</button>
    </div>
  </div>
</div>
<script>
// Canvas dimensions matching FB 5-photo frame ratio (1.049:1)
// measured from actual FB screenshot
const CW=1080, CH=1029;
const TOP_FRAC=0.522;
const TOP_H=Math.round(CH*TOP_FRAC); // 537
const BOT_H=CH-TOP_H;                // 492
const HALF=CW/2;                     // 540
const THIRD=Math.floor(CW/3);        // 360

// After cutting each slot, pad left+right by 100% of slot width each side
// so content sits in center 1/3 of upload → FB crops center = our content
const SLOTS=[
  {sx:0,      sy:0,     sw:HALF,       sh:TOP_H, label:"①บนซ้าย"},
  {sx:HALF,   sy:0,     sw:HALF,       sh:TOP_H, label:"②บนขวา"},
  {sx:0,      sy:TOP_H, sw:THIRD,      sh:BOT_H, label:"③ล่างซ้าย"},
  {sx:THIRD,  sy:TOP_H, sw:THIRD,      sh:BOT_H, label:"④ล่างกลาง"},
  {sx:THIRD*2,sy:TOP_H, sw:CW-THIRD*2,sh:BOT_H, label:"⑤ล่างขวา"},
];

let imgSrc,natW,natH,cx,cy,cs,ds=1,tiles=[];

// Crop box uses the FB frame ratio, not square
function getCropH(w){ return Math.round(w*(CH/CW)); }

function loadFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    imgSrc=e.target.result;
    const i=new Image();
    i.onload=()=>{
      natW=i.width;natH=i.height;
      // Default crop: fit FB frame ratio centered
      const cropW=Math.min(natW, Math.round(natH*(CW/CH)));
      const cropH=Math.round(cropW*(CH/CW));
      cs=cropW; // cs = crop width, cropH derived
      cx=Math.round((natW-cropW)/2);
      cy=Math.round((natH-cropH)/2);
      initCrop();
    };
    i.src=imgSrc;
  };
  r.readAsDataURL(f);inp.value='';
}

function cropH(){ return Math.round(cs*(CH/CW)); }

function initCrop(){
  document.getElementById('cropImg').src=imgSrc;
  const maxW=Math.min(window.innerWidth-32,440);
  ds=Math.min(maxW/natW,(maxW*(CH/CW))/natH,1);
  const w=document.getElementById('cropWrap');
  w.style.width=Math.round(natW*ds)+'px';
  w.style.height=Math.round(natH*ds)+'px';
  const maxCS=Math.min(natW,Math.round(natH*(CW/CH)));
  document.getElementById('slider').value=Math.round(cs/maxCS*100);
  updateUI();show('sCrop');
  document.getElementById('sub').textContent='ลากกรอบ · ปรับขนาด · กด Confirm';
}

function updateUI(){
  const ch=cropH();
  const bL=Math.round(cx*ds),bT=Math.round(cy*ds);
  const bW=Math.round(cs*ds),bH=Math.round(ch*ds);
  const dW=Math.round(natW*ds),dH=Math.round(natH*ds);
  const box=document.getElementById('cropBox');
  box.style.left=bL+'px';box.style.top=bT+'px';
  box.style.width=bW+'px';box.style.height=bH+'px';
  sd('dT',0,0,dW,bT);sd('dB',0,bT+bH,dW,Math.max(0,dH-bT-bH));
  sd('dL',0,bT,bL,bH);sd('dR',bL+bW,bT,Math.max(0,dW-bL-bW),bH);
  const tf=(TOP_H/CH*100).toFixed(1);
  document.getElementById('hLine').style.cssText=`top:${tf}%;left:0;width:100%;height:2px`;
  document.getElementById('v1').style.cssText=`top:0;left:50%;height:${tf}%;width:2px`;
  document.getElementById('v2').style.cssText=`top:${tf}%;left:33.3%;height:${100-parseFloat(tf)}%;width:2px`;
  document.getElementById('v3').style.cssText=`top:${tf}%;left:66.6%;height:${100-parseFloat(tf)}%;width:2px`;
  const maxCS=Math.min(natW,Math.round(natH*(CW/CH)));
  const pct=Math.round(cs/maxCS*100);
  document.getElementById('sliderLbl').textContent=`ขนาด: ${pct}% · ${cs}×${cropH()}px — ลากได้เลย`;
}

function sd(id,l,t,w,h){
  const d=document.getElementById(id);
  d.style.left=l+'px';d.style.top=t+'px';d.style.width=w+'px';d.style.height=Math.max(0,h)+'px';
}

function onSlider(v){
  const maxCS=Math.min(natW,Math.round(natH*(CW/CH)));
  const nw=Math.round(v/100*maxCS);
  const nh=Math.round(nw*(CH/CW));
  cx=Math.max(0,Math.min(natW-nw,cx+Math.round((cs-nw)/2)));
  cy=Math.max(0,Math.min(natH-nh,cy+Math.round((cropH()-nh)/2)));
  cs=nw;updateUI();
}

const cw2=document.getElementById('cropWrap');
cw2.addEventListener('mousedown',startDrag);
cw2.addEventListener('touchstart',startDrag,{passive:false});

function startDrag(e){
  e.preventDefault();
  const t=e.touches?e.touches[0]:e;
  const sx=t.clientX,sy=t.clientY,ox=cx,oy=cy;
  function mv(e){
    const t=e.touches?e.touches[0]:e;
    const ch=cropH();
    cx=Math.max(0,Math.min(natW-cs,ox+Math.round((t.clientX-sx)/ds)));
    cy=Math.max(0,Math.min(natH-ch,oy+Math.round((t.clientY-sy)/ds)));
    updateUI();
  }
  function up(){
    window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);
    window.removeEventListener('touchmove',mv);window.removeEventListener('touchend',up);
  }
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  window.addEventListener('touchmove',mv,{passive:false});window.addEventListener('touchend',up);
}

function cut(){
  const img=new Image();
  img.onload=()=>{
    // Draw crop region onto CW x CH canvas
    const src=document.createElement('canvas');
    src.width=CW;src.height=CH;
    src.getContext('2d').drawImage(img,cx,cy,cs,cropH(),0,0,CW,CH);

    tiles=SLOTS.map(s=>{
      // Pad left+right by 100% each side → content in center 1/3
      const outW=s.sw*3;
      const outH=s.sh;
      const padX=s.sw; // 100% pad each side
      const cvs=document.createElement('canvas');
      cvs.width=outW;cvs.height=outH;
      const c=cvs.getContext('2d');
      // Fill with edge-stretched color (sample edge pixel to blend better than black)
      c.fillStyle='#000';c.fillRect(0,0,outW,outH);
      c.drawImage(src,s.sx,s.sy,s.sw,s.sh,padX,0,s.sw,s.sh);
      return{url:cvs.toDataURL('image/jpeg',.93),label:s.label,
             outW,outH,tileW:s.sw,tileH:s.sh};
    });
    renderResult();show('sResult');
    document.getElementById('sub').textContent='โพสต์ตามลำดับ ①②③④⑤';
  };
  img.src=imgSrc;
}

function renderResult(){
  const pt=document.getElementById('prevTop');
  const pb=document.getElementById('prevBot');
  pt.innerHTML='';pb.innerHTML='';
  // Preview: show only content area (center crop simulation)
  tiles.slice(0,2).forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='preview-cell';
    d.style.aspectRatio=t.tileW+'/'+t.tileH;
    d.onclick=()=>dl(t,i);
    d.innerHTML=`<img src="${t.url}" style="object-position:center">`;
    pt.appendChild(d);
  });
  tiles.slice(2).forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='preview-cell';
    d.style.aspectRatio=t.tileW+'/'+t.tileH;
    d.onclick=()=>dl(t,i+2);
    d.innerHTML=`<img src="${t.url}" style="object-position:center">`;
    pb.appendChild(d);
  });
  const list=document.getElementById('tileList');list.innerHTML='';
  tiles.forEach((t,i)=>{
    const d=document.createElement('div');d.className='tile-item';d.onclick=()=>dl(t,i);
    d.innerHTML=`<img class="tile-thumb" src="${t.url}">
      <div style="flex:1"><div class="tile-name">${t.label}</div>
      <div class="tile-size">${t.outW}×${t.outH}px · pad ±${t.tileW}px</div></div>
      <div class="tile-dl">⬇</div>`;
    list.appendChild(d);
  });
}

function dl(t,i){const a=document.createElement('a');a.href=t.url;a.download=`fb_${i+1}_${t.label}.jpg`;a.click();}
function dlAll(){tiles.forEach((t,i)=>setTimeout(()=>dl(t,i),i*200));}
function show(id){['sUpload','sCrop','sResult'].forEach(s=>document.getElementById(s).style.display=s===id?'':'none');}
function goUpload(){show('sUpload');document.getElementById('sub').textContent='ตัดภาพเดียวเป็น 5 ช่องพอดี FB layout';}
</script>
</body>
</html>
